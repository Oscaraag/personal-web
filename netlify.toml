# Netlify deploy config for an Astro static site.
# Netlify detects pnpm from pnpm-lock.yaml and the `packageManager` field.
[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Long-cache the fingerprinted assets Astro emits (fonts, CSS, JS).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
